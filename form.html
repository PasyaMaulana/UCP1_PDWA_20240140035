<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Pendaftaran - Tech Community</title>
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body>
    <nav>
      <a href="./index.html">Beranda</a>
      <a href="./form.html">Form Pendaftaran</a>
      <a href="./gallery.html">Gallery</a>
    </nav>

    <h1>Form Pendaftaran Anggota Tech Community</h1>

    <label>Nama Lengkap:</label>
    <input type="text" id="nama" placeholder="Masukkan nama lengkap" />

    <label>Email:</label>
    <input type="email" id="email" placeholder="Masukkan email" />

    <label>Bidang Minat:</label>
    <select id="minat">
      <option value="">-- Pilih Bidang Minat --</option>
      <option value="Web Development">Web Development</option>
      <option value="Mobile Development">Mobile Development</option>
      <option value="Data Science">Data Science</option>
      <option value="Cybersecurity">Cybersecurity</option>
      <option value="UI/UX Design">UI/UX Design</option>
      <option value="Machine Learning">Machine Learning</option>
    </select>

    <button onclick="submitForm()">Submit</button>
    <a href="./index.html"><button>Kembali</button></a>

    <div id="result-box">
      <strong>Data berhasil disimpan!</strong><br />
      Nama : <span id="res-nama"></span><br />
      Email : <span id="res-email"></span><br />
      Minat : <span id="res-minat"></span>
    </div>

    <script src="script/script.js"></script>
  </body>
</html>
