<html lang="id">
  <head>

    <link rel="stylesheet" href="styles/style.css" />

    <h1>Gallery Tech Community</h1>

    <div class="media-section">
      <h2>Foto Kegiatan</h2>
      <img
        id="gambar-utama"
        src=""
        alt="Foto Kegiatan"
        width="400"
        height="250"
      />

      <button onclick="gantiGambar()">Ganti Gambar</button>
      <button onclick="infoGambar()">Info Gambar</button>
    </div>

    <div class="media-section">
      <h2>Video Tutorial (HTML, CSS, JS)</h2>
      <iframe
        width="400"
        height="250"
        src="https://www.youtube.com/embed/MCVkMmYL-aY"
        title="Video Tech Community"
        allowfullscreen
      >
      </iframe>
    </div>

    <div class="media-section">
      <h2>Musik Santai Sambil Ngoding</h2>
      <audio id="audio-ku" controls>
        <source src="audio/musik.mp3" type="audio/mpeg" />
      </audio>
      <br /><br />
      <button onclick="putarAudio()">Play</button>
      <button onclick="stopAudio()">Stop</button>
    </div>
